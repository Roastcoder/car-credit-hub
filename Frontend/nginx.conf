server {
    listen 3000;
    listen [::]:3000;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://backend.meharadvisory.cloud https://app.meharadvisory.com; connect-src 'self' https://backend.meharadvisory.cloud https://app.meharadvisory.com wss://backend.meharadvisory.cloud; font-src 'self' https://fonts.gstatic.com; frame-src 'self'; frame-ancestors 'none';" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;

    location /health {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
