version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: car_credit_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: car_credit_hub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: car_credit_backend
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: car_credit_hub
      JWT_SECRET: your-super-secret-jwt-key
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    restart: unless-stopped

  frontend:
    build: .
    container_name: car_credit_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
